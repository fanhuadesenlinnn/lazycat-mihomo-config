# ============================================================
# Mihomo / Clash Meta 长期使用配置
# 场景：中国大陆日常使用 + 懒猫微服兼容 + 低维护
# 提醒：首次使用只需要改下面 proxy-providers.all-proxies.url 为你的订阅链接。
# ============================================================

# ------------------------------
# 基础监听
# ------------------------------
mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: true
unified-delay: true
tcp-concurrent: true
global-client-fingerprint: chrome

# 外部控制接口。默认仅本机访问，避免局域网裸露控制 API。
external-controller: 127.0.0.1:9090
# 如需局域网访问面板，请改为 0.0.0.0:9090，并务必设置 secret。
secret: ""

profile:
  # 记住策略组选择，减少后续反复调整。
  store-selected: true
  # 记住 fake-ip 映射，重启后体验更稳定。
  store-fake-ip: true

# ------------------------------
# TUN 透明代理
# ------------------------------
tun:
  # 桌面客户端一般可在 UI 里打开 TUN；服务端/路由器部署可改为 true。
  enable: false
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  dns-hijack:
    - any:53
    - tcp://any:53
  # 懒猫微服要求：这两个地址必须绕过 TUN，确保打洞/局域网出口判断正常。
  route-exclude-address:
    - 6.6.6.6/32
    - 2000::6666/128

# ------------------------------
# DNS：大陆网络友好 + Fake-IP + 懒猫微服真实解析
# ------------------------------
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  use-hosts: true
  use-system-hosts: true
  respect-rules: false

  # 用于解析 DNS 服务器域名，必须是 IP。
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114

  # 国内 DNS 作为主解析，减少大陆服务延迟。
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - tls://223.5.5.5:853

  # 境外 DNS 仅在命中污染/境外规则时参与。
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - tls://1.0.0.1:853

  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
    ipcidr:
      - 240.0.0.0/4
    domain:
      - +.google.com
      - +.facebook.com
      - +.youtube.com
      - +.twitter.com
      - +.x.com

  nameserver-policy:
    # 懒猫微服要求：heiyu.space / lazycat.cloud 返回真实 IP，不能进入 fake-ip。
    "+.heiyu.space":
      - fc03:1136:3800::1
      - https://dns.alidns.com/dns-query
    "+.lazycat.cloud":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    # 常见国内域名优先国内 DNS。
    "rule-set:direct":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:private":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query

  # 以下域名必须返回真实 IP，避免局域网、时间同步、投屏、游戏联机、懒猫微服异常。
  fake-ip-filter:
    - +.heiyu.space
    - +.lazycat.cloud
    - "*.lan"
    - "*.local"
    - "*.localdomain"
    - "*.home.arpa"
    - localhost
    - localhost.*.*
    - time.*.com
    - time.*.gov
    - time.*.edu.cn
    - time.*.apple.com
    - ntp.*.com
    - ntp.*.org
    - +.pool.ntp.org
    - +.msftconnecttest.com
    - +.msftncsi.com
    - stun.*.*
    - stun.*.*.*
    - +.stun.*.*
    - +.stun.*.*.*
    - +.stun.*.*.*.*
    - +.srv.nintendo.net
    - +.stun.playstation.net
    - xbox.*.microsoft.com
    - +.ipv6.microsoft.com
    - +.battlenet.com.cn
    - +.wotgame.cn
    - +.wggames.cn
    - +.wowsgame.cn
    - +.wargaming.net
    - music.163.com
    - "*.music.163.com"
    - "*.126.net"
    - "*.mcdn.bilivideo.cn"

# ------------------------------
# 嗅探：提升纯 IP、QUIC、部分客户端的分流准确度
# ------------------------------
sniffer:
  enable: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - +.v2ex.com
  skip-domain:
    - +.heiyu.space
    - +.lazycat.cloud
    - +.lan
    - +.local
    - Mijia Cloud

# ------------------------------
# 代理订阅
# ------------------------------
proxy-providers:
  all-proxies:
    type: http
    # 只改这里：替换为你的订阅链接。不要把真实订阅链接提交到公开仓库。
    url: "https://example.com/your-subscription-url"
    interval: 86400
    path: ./providers/all-proxies.yaml
    health-check:
      enable: true
      interval: 600
      lazy: true
      url: https://www.gstatic.com/generate_204

# ------------------------------
# 策略组
# ------------------------------
proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🛟 故障转移
      - 🚀 手动切换
      - 🇭🇰 香港
      - 🇹🇼 台湾
      - 🇯🇵 日本
      - 🇸🇬 新加坡
      - 🇺🇸 美国
      - 🌍 其他地区
      - DIRECT

  - name: 🚀 手动切换
    type: select
    use:
      - all-proxies
    proxies:
      - DIRECT

  - name: ♻️ 自动选择
    type: url-test
    use:
      - all-proxies
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🛟 故障转移
    type: fallback
    use:
      - all-proxies
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: 🇭🇰 香港
    type: url-test
    use:
      - all-proxies
    filter: "(?i)港|香港|HK|Hong Kong"
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇹🇼 台湾
    type: url-test
    use:
      - all-proxies
    filter: "(?i)台|台湾|TW|Taiwan"
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇯🇵 日本
    type: url-test
    use:
      - all-proxies
    filter: "(?i)日|日本|JP|Japan"
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇸🇬 新加坡
    type: url-test
    use:
      - all-proxies
    filter: "(?i)新|新加坡|SG|Singapore"
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇺🇸 美国
    type: url-test
    use:
      - all-proxies
    filter: "(?i)美|美国|US|United States|America"
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🌍 其他地区
    type: select
    use:
      - all-proxies
    filter: "^(?!.*(?i:港|香港|HK|Hong Kong|台|台湾|TW|Taiwan|日|日本|JP|Japan|新|新加坡|SG|Singapore|美|美国|US|United States|America)).*$"

  - name: 🤖 AI 服务
    type: select
    proxies:
      - 🇺🇸 美国
      - 🇯🇵 日本
      - 🇸🇬 新加坡
      - 🚀 节点选择
      - 🚀 手动切换

  - name: 📺 流媒体
    type: select
    proxies:
      - 🚀 节点选择
      - 🇭🇰 香港
      - 🇹🇼 台湾
      - 🇯🇵 日本
      - 🇸🇬 新加坡
      - 🇺🇸 美国
      - 🚀 手动切换

  - name: 💬 Telegram
    type: select
    proxies:
      - 🚀 节点选择
      - 🇸🇬 新加坡
      - 🇭🇰 香港
      - 🇯🇵 日本
      - 🚀 手动切换

  - name: 🧰 GitHub
    type: select
    proxies:
      - 🚀 节点选择
      - 🇭🇰 香港
      - 🇯🇵 日本
      - 🇸🇬 新加坡
      - DIRECT

  - name: 🍎 Apple
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: Ⓜ️ Microsoft
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: 🎮 游戏平台
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
      - 🇭🇰 香港
      - 🇯🇵 日本
      - 🇸🇬 新加坡

  - name: 🎯 国内流量
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: 🛑 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: 🐱 懒猫微服
    type: select
    proxies:
      - DIRECT

# ------------------------------
# 分流规则：从高优先级到低优先级
# ------------------------------
rules:
  # 懒猫微服：官方要求真实 DNS、TUN 旁路、IPv6 内网段直连。
  - DOMAIN-SUFFIX,heiyu.space,🐱 懒猫微服
  - DOMAIN-SUFFIX,lazycat.cloud,🐱 懒猫微服
  - IP-CIDR,6.6.6.6/32,DIRECT,no-resolve
  - IP-CIDR6,2000::6666/128,DIRECT,no-resolve
  - IP-CIDR6,fc03:1136:3800::/40,DIRECT,no-resolve

  # 局域网、私有地址、系统服务永远直连。
  - RULE-SET,private,DIRECT
  - RULE-SET,lancidr,DIRECT,no-resolve
  - RULE-SET,applications,DIRECT

  # 广告与 HTTPDNS。HTTPDNS 走拦截可减少 App 绕过系统 DNS。
  - RULE-SET,reject,🛑 广告拦截
  - RULE-SET,httpdns,🛑 广告拦截

  # 常见服务分组。
  - RULE-SET,ai,🤖 AI 服务
  - RULE-SET,youtube,📺 流媒体
  - RULE-SET,netflix,📺 流媒体
  - RULE-SET,disney,📺 流媒体
  - RULE-SET,spotify,📺 流媒体
  - RULE-SET,telegram,💬 Telegram
  - RULE-SET,telegramcidr,💬 Telegram,no-resolve
  - RULE-SET,github,🧰 GitHub
  - RULE-SET,apple,🍎 Apple
  - RULE-SET,icloud,🍎 Apple
  - RULE-SET,microsoft,Ⓜ️ Microsoft
  - RULE-SET,steam,🎮 游戏平台

  # 国内域名/IP 直连，国外常见规则走代理。
  - RULE-SET,direct,🎯 国内流量
  - RULE-SET,cncidr,🎯 国内流量,no-resolve
  - RULE-SET,proxy,🚀 节点选择
  - RULE-SET,gfw,🚀 节点选择
  - RULE-SET,greatfire,🚀 节点选择
  - RULE-SET,tld-not-cn,🚀 节点选择
  - GEOIP,CN,🎯 国内流量
  - MATCH,🚀 节点选择

